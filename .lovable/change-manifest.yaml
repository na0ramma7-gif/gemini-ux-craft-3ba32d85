intent: >
  Consolidated handoff manifest covering all material changes shipped between
  2026-04-21 07:12 and 2026-04-22 06:42. Spans the financial single-source-of-truth
  unification, terminology + formula standardization (Planned->Target, removed
  x1.35 multiplier), revenue model refactor to subscription-driver
  (Revenue = Rate x Transactions) with per-feature service catalog and legacy
  migration, Strategic Alignment as a managed entity with bidirectional
  Portfolio<->Product linking, full Forecast module redesign to a direct-entry
  per-cell grid (schema v3), Add Portfolio/Product full-profile dialogs,
  validation hardening across all create/edit dialogs, dashboard chart a11y
  height fix, and a global Dialog layout refactor (3-row flex header/body/footer).
